<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      padding: 32px;
      width: 100%;
      max-width: 600px;
      height: fit-content;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    #todo-input {
      flex: 1;
      padding: 12px 16px;
      font-size: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    #todo-input:focus {
      border-color: #4f46e5;
    }

    #add-btn {
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 600;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    #add-btn:hover {
      background: #4338ca;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 6px 14px;
      font-size: 13px;
      border: 1px solid #d1d5db;
      background: white;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      color: #6b7280;
    }

    .filter-btn.active {
      background: #4f46e5;
      color: white;
      border-color: #4f46e5;
    }

    .stats {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 16px;
    }

    #todo-list {
      list-style: none;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid #f0f0f0;
      border-radius: 8px;
      margin-bottom: 8px;
      background: #fafafa;
      transition: all 0.2s;
    }

    .todo-item:hover {
      border-color: #d1d5db;
      background: #f5f5f5;
    }

    .todo-item.completed {
      opacity: 0.6;
    }

    .todo-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #4f46e5;
    }

    .todo-text {
      flex: 1;
      font-size: 15px;
      color: #374151;
    }

    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .edit-input {
      flex: 1;
      font-size: 15px;
      padding: 4px 8px;
      border: 1px solid #4f46e5;
      border-radius: 4px;
      outline: none;
    }

    .edit-btn, .delete-btn, .save-btn, .cancel-btn {
      padding: 5px 10px;
      font-size: 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: 500;
    }

    .edit-btn {
      background: #e0e7ff;
      color: #4f46e5;
    }

    .save-btn {
      background: #d1fae5;
      color: #065f46;
    }

    .cancel-btn {
      background: #f3f4f6;
      color: #6b7280;
    }

    .delete-btn {
      background: #fee2e2;
      color: #991b1b;
    }

    .empty-state {
      text-align: center;
      padding: 32px;
      color: #9ca3af;
      font-size: 15px;
    }

    .clear-completed-btn {
      margin-top: 16px;
      padding: 8px 16px;
      font-size: 13px;
      background: #f3f4f6;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: #6b7280;
      display: none;
    }

    .clear-completed-btn:hover {
      background: #e5e7eb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Todo App</h1>

    <div class="input-row">
      <input
        type="text"
        id="todo-input"
        placeholder="Add a new task..."
        aria-label="New todo input"
      />
      <button id="add-btn">Add Task</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <div class="stats" id="stats">0 tasks</div>

    <ul id="todo-list"></ul>

    <button class="clear-completed-btn" id="clear-completed">
      Clear Completed
    </button>
  </div>

  <script>
    let todos = [];
    let currentFilter = 'all';
    let nextId = 1;

    const input = document.getElementById('todo-input');
    const addBtn = document.getElementById('add-btn');
    const todoList = document.getElementById('todo-list');
    const statsEl = document.getElementById('stats');
    const clearBtn = document.getElementById('clear-completed');

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      todos.push({ id: nextId++, text, completed: false });
      input.value = '';
      render();
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      render();
    }

    function toggleTodo(id) {
      const t = todos.find(t => t.id === id);
      if (t) t.completed = !t.completed;
      render();
    }

    function startEdit(id) {
      const item = document.querySelector(`[data-id="${id}"]`);
      const t = todos.find(t => t.id === id);
      if (!item || !t) return;

      const span = item.querySelector('.todo-text');
      const editBtn = item.querySelector('.edit-btn');
      const deleteBtn = item.querySelector('.delete-btn');

      span.style.display = 'none';
      editBtn.style.display = 'none';
      deleteBtn.style.display = 'none';

      const editInput = document.createElement('input');
      editInput.className = 'edit-input';
      editInput.value = t.text;

      const saveBtn = document.createElement('button');
      saveBtn.className = 'save-btn';
      saveBtn.textContent = 'Save';
      saveBtn.onclick = () => saveEdit(id, editInput.value);

      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'cancel-btn';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.onclick = () => render();

      item.appendChild(editInput);
      item.appendChild(saveBtn);
      item.appendChild(cancelBtn);
      editInput.focus();
    }

    function saveEdit(id, newText) {
      const trimmed = newText.trim();
      if (!trimmed) return;
      const t = todos.find(t => t.id === id);
      if (t) t.text = trimmed;
      render();
    }

    function clearCompleted() {
      todos = todos.filter(t => !t.completed);
      render();
    }

    function setFilter(f) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === f);
      });
      render();
    }

    function render() {
      const filtered = todos.filter(t => {
        if (currentFilter === 'active') return !t.completed;
        if (currentFilter === 'completed') return t.completed;
        return true;
      });

      const active = todos.filter(t => !t.completed).length;
      const completedCount = todos.filter(t => t.completed).length;
      statsEl.textContent = `${active} task${active !== 1 ? 's' : ''} remaining`;

      clearBtn.style.display = completedCount > 0 ? 'block' : 'none';

      if (filtered.length === 0) {
        todoList.innerHTML = `<div class="empty-state">No tasks to show</div>`;
        return;
      }

      todoList.innerHTML = filtered
        .map(
          t => `
          <li class="todo-item ${t.completed ? 'completed' : ''}" data-id="${t.id}">
            <input type="checkbox" class="todo-checkbox" ${t.completed ? 'checked' : ''} aria-label="Complete task" />
            <span class="todo-text">${escapeHtml(t.text)}</span>
            <button class="edit-btn">Edit</button>
            <button class="delete-btn">Delete</button>
          </li>`
        )
        .join('');

      // Attach listeners
      todoList.querySelectorAll('.todo-item').forEach(item => {
        const id = parseInt(item.dataset.id);
        item.querySelector('.todo-checkbox').addEventListener('change', () => toggleTodo(id));
        item.querySelector('.edit-btn').addEventListener('click', () => startEdit(id));
        item.querySelector('.delete-btn').addEventListener('click', () => deleteTodo(id));
      });
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    addBtn.addEventListener('click', addTodo);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
    clearBtn.addEventListener('click', clearCompleted);
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => setFilter(btn.dataset.filter));
    });

    render();
  </script>
</body>
</html>
